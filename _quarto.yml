project:
  type: book
  output-dir: docs

lang: pt-PT

book:
  title: "Ferramentas e Aplicações Multimédia"
  subtitle: "Sebenta da Unidade Curricular"
  author:
    - name: "João Pavão"
      affiliation: "Universidade de Trás-os-Montes e Alto Douro"
    - name: "Sérgio Madeira"
      affiliation: "Universidade de Trás-os-Montes e Alto Douro"
  date: "2026-04-03"

  chapters:
    - index.qmd
    - capitulos/cap01.qmd
    - capitulos/cap02.qmd
    - capitulos/cap03.qmd
    - capitulos/cap04.qmd
    - capitulos/cap05.qmd
    - capitulos/cap06.qmd

  sidebar:
    search: true

  page-footer:
    left: "Ferramentas e Aplicações Multimédia — UTAD"

format:
  html:
    theme: 
        light: litera
        dark: darkly
    css: assets/css/custom.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    number-sections: true
    number-depth: 3
    highlight-style: github
    code-fold: false
    code-tools: true
    fig-align: center

  pdf:
    documentclass: scrbook
    classoption: [oneside]
    papersize: a4
    fontsize: 11pt
    toc: true
    toc-depth: 3
    number-sections: true
    colorlinks: true
    linkcolor: "NavyBlue"
    urlcolor: "NavyBlue"
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=3cm
      - right=2.5cm
    include-in-header:
      text: |
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{multirow}
        \usepackage{amssymb}
        \usepackage{amsmath}
        \usepackage{caption}
        \captionsetup{font=small, labelfont=bf}
    engine: lualatex

execute:
  echo: true
  warning: false
  message: false
